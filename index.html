<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Video Splitter</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #000000;
            --border: #e0e0e0;
            --gray: #f4f4f4;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        /* Drag & Drop Area */
        #drop-zone {
            border: 2px dashed var(--border);
            padding: 60px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            background: var(--bg);
            overflow: hidden;
        }

        #drop-zone.hover {
            border-color: var(--accent);
            background: var(--gray);
        }

        #drop-zone p {
            margin: 0;
            color: var(--text);
            font-weight: 500;
        }

        /* Settings Area */
        #settings {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 8px;
            color: #666;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            transition: var(--transition);
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Result List */
        #results {
            margin-top: 30px;
            list-style: none;
        }

        .clip-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--gray);
            margin-bottom: 10px;
            border-radius: 8px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .clip-item span {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .download-btn {
            background: none;
            color: var(--accent);
            width: auto;
            padding: 5px 10px;
            text-decoration: underline;
            font-size: 0.8rem;
        }

        /* Progress Bar */
        #progress-container {
            display: none;
            margin-top: 20px;
        }

        #progress-bar {
            width: 100%;
            height: 4px;
            background: var(--gray);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        #status-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 8px;
            color: #999;
        }

        footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Batch Processor</h1>
        <p>Split your video into multiple parts.</p>

        <div id="drop-zone">
            <p id="drop-text">Drag video here or click to upload</p>
            <input type="file" id="file-input" accept="video/*" style="display: none;">
        </div>

        <div id="settings">
            <div class="input-group">
                <label>Number of Clips</label>
                <input type="number" id="clip-count" value="2" min="2" max="20">
            </div>
            <button id="process-btn">Process & Split</button>
        </div>

        <div id="progress-container">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="status-text">Processing Part 1...</div>
        </div>

        <ul id="results"></ul>

        <footer>Built for clean workflows. Works locally.</footer>
    </div>

    <!-- Hidden video element for processing -->
    <video id="hidden-video" style="display:none;"></video>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const settings = document.getElementById('settings');
        const processBtn = document.getElementById('process-btn');
        const clipCountInput = document.getElementById('clip-count');
        const resultsList = document.getElementById('results');
        const hiddenVideo = document.getElementById('hidden-video');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');

        let sourceFile = null;

        // Trigger file input
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop logic
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('hover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                sourceFile = files[0];
                document.getElementById('drop-text').innerText = `File: ${sourceFile.name}`;
                settings.style.display = 'block';
                resultsList.innerHTML = '';
            } else {
                alert("Please upload a valid video file.");
            }
        }

        processBtn.addEventListener('click', async () => {
            const numClips = parseInt(clipCountInput.value);
            if (!sourceFile || numClips < 1) return;

            // Reset UI
            resultsList.innerHTML = '';
            processBtn.disabled = true;
            progressContainer.style.display = 'block';
            
            const objectURL = URL.createObjectURL(sourceFile);
            hiddenVideo.src = objectURL;

            // Wait for metadata
            await new Promise(r => hiddenVideo.onloadedmetadata = r);
            
            const duration = hiddenVideo.duration;
            const clipDuration = duration / numClips;

            for (let i = 0; i < numClips; i++) {
                const startTime = i * clipDuration;
                statusText.innerText = `Slicing Part ${i + 1} of ${numClips}...`;
                progressFill.style.width = `${((i + 1) / numClips) * 100}%`;
                
                const clipBlob = await extractClip(objectURL, startTime, clipDuration);
                addDownloadLink(clipBlob, i + 1);
            }

            statusText.innerText = "Processing Complete.";
            processBtn.disabled = false;
        });

        async function extractClip(url, start, duration) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.src = url;
                video.muted = true;
                video.currentTime = start;

                video.oncanplay = () => {
                    const stream = video.captureStream();
                    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
                    const chunks = [];

                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        resolve(blob);
                    };

                    video.play();
                    recorder.start();

                    setTimeout(() => {
                        recorder.stop();
                        video.pause();
                    }, duration * 1000);
                };
            });
        }

        function addDownloadLink(blob, index) {
            const url = URL.createObjectURL(blob);
            const li = document.createElement('li');
            li.className = 'clip-item';
            li.innerHTML = `
                <span>Part ${index}.webm</span>
                <a href="${url}" download="clip_${index}.webm" class="download-btn">Download</a>
            `;
            resultsList.appendChild(li);
        }
    </script>
</body>
</html>
