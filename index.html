<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Splitter // Grayscale</title>
    
    <!-- Using FFmpeg v0.11 (Does not require COOP/COEP headers) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text: #888888;
            --border: #222222;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 40px;
            color: var(--text);
        }

        /* Upload Area */
        .upload-box {
            border: 1px solid var(--border);
            padding: 50px 20px;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255,255,255,0.02);
            margin-bottom: 20px;
        }

        .upload-box:hover {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .upload-box p {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text);
        }

        /* UI Elements */
        .controls {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text);
        }

        input[type="number"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            width: 40px;
            text-align: center;
            outline: none;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover { filter: invert(1); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #status {
            margin-top: 20px;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text);
            letter-spacing: 1px;
        }

        .download-link {
            display: block;
            margin-top: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--accent);
            font-size: 0.7rem;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .download-link:hover { border-color: var(--accent); }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Splitter</h1>

        <div class="upload-box" id="dropZone">
            <p id="fileNameDisplay">Click or Drop MP4</p>
        </div>
        
        <input type="file" id="fileInput" accept="video/mp4">

        <div class="controls" id="controls">
            <div class="input-row">
                <span>Split into</span>
                <input type="number" id="clipCount" value="2" min="2">
                <span>Clips</span>
            </div>
            <button id="startBtn">Process Video</button>
        </div>

        <div id="status">Waiting for file...</div>
        <div id="results"></div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');
        const startBtn = document.getElementById('startBtn');
        const results = document.getElementById('results');
        const clipCountInput = document.getElementById('clipCount');

        let videoFile = null;

        // 1. Initialize FFmpeg immediately
        (async () => {
            status.innerText = "Initializing Engine...";
            await ffmpeg.load();
            status.innerText = "Ready";
        })();

        // 2. Handle File Selection
        dropZone.onclick = () => fileInput.click();
        
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#fff"; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = ""; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (file && file.type.includes("video")) {
                videoFile = file;
                document.getElementById('fileNameDisplay').innerText = file.name;
                controls.style.display = "flex";
                status.innerText = "File loaded. Ready to process.";
            }
        }

        // 3. Process Video
        startBtn.onclick = async () => {
            const numClips = parseInt(clipCountInput.value);
            startBtn.disabled = true;
            results.innerHTML = "";
            
            status.innerText = "Reading video data...";
            const { name } = videoFile;
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));

            // Get duration
            const video = document.createElement('video');
            video.src = URL.createObjectURL(videoFile);
            video.onloadedmetadata = async () => {
                const duration = video.duration;
                const segmentTime = duration / numClips;

                for (let i = 0; i < numClips; i++) {
                    const start = i * segmentTime;
                    const output = `part_${i + 1}.mp4`;
                    status.innerText = `Processing part ${i + 1} of ${numClips}...`;

                    // Using "-c copy" for exact quality & speed
                    await ffmpeg.run('-ss', start.toString(), '-t', segmentTime.toString(), '-i', 'input.mp4', '-c', 'copy', output);

                    const data = ffmpeg.FS('readFile', output);
                    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = output;
                    a.className = "download-link";
                    a.innerText = `Download Part ${i + 1}`;
                    results.appendChild(a);
                }

                status.innerText = "Done.";
                startBtn.disabled = false;
            };
        };
    </script>
</body>
</html>
