<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Split & Merge // Grayscale</title>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text: #888888;
            --border: #222222;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--accent); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .container { width: 100%; max-width: 600px; text-align: center; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 30px; color: var(--text); }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .tab { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; color: var(--text); padding-bottom: 5px; border-bottom: 1px solid transparent; transition: var(--transition); }
        .tab.active { color: var(--accent); border-bottom: 1px solid var(--accent); }

        /* Zones */
        .drop-zone { border: 1px solid var(--border); padding: 60px 20px; cursor: pointer; transition: var(--transition); background: rgba(255,255,255,0.01); margin-bottom: 20px; }
        .drop-zone:hover { border-color: var(--accent); background: rgba(255,255,255,0.04); }
        .drop-zone p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text); }

        /* Preview Area */
        .preview-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; text-align: left; }
        .preview-item { display: flex; align-items: center; gap: 15px; background: #111; padding: 10px; border: 1px solid var(--border); font-size: 0.7rem; color: var(--text); }
        .preview-item video { width: 80px; height: 45px; background: #000; }

        /* Controls */
        .ui-group { display: none; flex-direction: column; gap: 20px; margin-top: 20px; }
        .input-row { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.7rem; text-transform: uppercase; color: var(--text); }
        input[type="number"] { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--accent); width: 40px; text-align: center; outline: none; }
        
        button { background: var(--accent); color: var(--bg); border: none; padding: 15px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; font-weight: bold; cursor: pointer; transition: var(--transition); width: 100%; }
        button:hover { filter: invert(1); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #status { margin-top: 20px; font-size: 0.6rem; text-transform: uppercase; color: var(--text); letter-spacing: 1px; }
        .download-link { display: block; margin-top: 10px; padding: 12px; border: 1px solid var(--border); text-decoration: none; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; transition: var(--transition); }
        .download-link:hover { background: var(--accent); color: var(--bg); }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Utility</h1>

        <div class="tabs">
            <div class="tab active" id="splitTab">Splitter</div>
            <div class="tab" id="mergeTab">Merger</div>
        </div>

        <div class="drop-zone" id="dropZone">
            <p id="dropText">Select or Drop MP4 File(s)</p>
        </div>
        
        <input type="file" id="fileInput" accept="video/mp4" multiple>

        <div id="previewArea" class="preview-list"></div>

        <div class="ui-group" id="splitControls">
            <div class="input-row">
                <span>Divide into</span>
                <input type="number" id="clipCount" value="2" min="2">
                <span>Segments</span>
            </div>
            <button id="splitBtn">Start Smooth Split</button>
        </div>

        <div class="ui-group" id="mergeControls">
            <button id="mergeBtn">Combine Files</button>
        </div>

        <div id="status">Engine loading...</div>
        <div id="results"></div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        
        let mode = 'split'; // 'split' or 'merge'
        let filesList = [];

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewArea = document.getElementById('previewArea');
        const status = document.getElementById('status');
        const results = document.getElementById('results');

        // Init Engine
        (async () => {
            await ffmpeg.load();
            status.innerText = "System Ready";
        })();

        // Tab Switching
        document.getElementById('splitTab').onclick = () => switchMode('split');
        document.getElementById('mergeTab').onclick = () => switchMode('merge');

        function switchMode(newMode) {
            mode = newMode;
            filesList = [];
            previewArea.innerHTML = "";
            results.innerHTML = "";
            document.getElementById('splitTab').classList.toggle('active', mode === 'split');
            document.getElementById('mergeTab').classList.toggle('active', mode === 'merge');
            document.getElementById('splitControls').style.display = 'none';
            document.getElementById('mergeControls').style.display = 'none';
            document.getElementById('dropText').innerText = mode === 'split' ? "Select or Drop MP4" : "Select or Drop Multiple Clips";
        }

        // File Handling
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => e.preventDefault();
        dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        async function handleFiles(files) {
            if (mode === 'split') {
                filesList = [files[0]];
                document.getElementById('splitControls').style.display = 'flex';
            } else {
                filesList = Array.from(files);
                document.getElementById('mergeControls').style.display = 'flex';
            }
            renderPreviews();
        }

        function renderPreviews() {
            previewArea.innerHTML = "";
            filesList.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'preview-item';
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.muted = true;
                video.onmouseenter = () => video.play();
                video.onmouseleave = () => { video.pause(); video.currentTime = 0; };
                
                item.innerHTML = `<span>#${index+1}</span>`;
                item.appendChild(video);
                item.innerHTML += `<span>${file.name}</span>`;
                previewArea.appendChild(item);
            });
        }

        // --- SPLIT LOGIC ---
        document.getElementById('splitBtn').onclick = async () => {
            const numClips = parseInt(document.getElementById('clipCount').value);
            const file = filesList[0];
            results.innerHTML = "";
            document.getElementById('splitBtn').disabled = true;

            status.innerText = "Processing video (Frame-accurate)...";
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

            const tempVid = document.createElement('video');
            tempVid.src = URL.createObjectURL(file);
            tempVid.onloadedmetadata = async () => {
                const segmentTime = tempVid.duration / numClips;
                for (let i = 0; i < numClips; i++) {
                    const start = (i * segmentTime).toFixed(3);
                    const output = `split_${i+1}.mp4`;
                    status.innerText = `Encoding Part ${i+1}/${numClips}...`;

                    // FIX CHOPPY: Re-encode with high quality (crf 18) and fast preset
                    await ffmpeg.run(
                        '-ss', start, 
                        '-t', segmentTime.toString(), 
                        '-i', 'input.mp4', 
                        '-c:v', 'libx264', 
                        '-crf', '18', 
                        '-preset', 'ultrafast', 
                        '-c:a', 'aac', 
                        output
                    );

                    createDownloadLink(output, `Split Part ${i+1}`);
                }
                status.innerText = "Split Complete";
                document.getElementById('splitBtn').disabled = false;
            };
        };

        // --- MERGE LOGIC ---
        document.getElementById('mergeBtn').onclick = async () => {
            results.innerHTML = "";
            document.getElementById('mergeBtn').disabled = true;
            status.innerText = "Merging clips...";

            let concatList = "";
            for (let i = 0; i < filesList.length; i++) {
                const name = `file${i}.mp4`;
                ffmpeg.FS('writeFile', name, await fetchFile(filesList[i]));
                concatList += `file '${name}'\n`;
            }
            ffmpeg.FS('writeFile', 'list.txt', concatList);

            await ffmpeg.run('-f', 'concat', '-safe', '0', '-i', 'list.txt', '-c', 'copy', 'merged.mp4');
            
            createDownloadLink('merged.mp4', 'Download Merged Video');
            status.innerText = "Merge Complete";
            document.getElementById('mergeBtn').disabled = false;
        };

        function createDownloadLink(fileName, label) {
            const data = ffmpeg.FS('readFile', fileName);
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.className = "download-link";
            a.innerText = label;
            results.appendChild(a);
        }
    </script>
</body>
</html>
