<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Splitter // Grayscale</title>
    
    <!-- FFmpeg v0.11 for maximum compatibility -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text: #888888;
            --border: #222222;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 0;
            overflow-y: auto;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 40px;
            color: var(--text);
        }

        .upload-box {
            border: 1px solid var(--border);
            padding: 60px 20px;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255,255,255,0.02);
            margin-bottom: 20px;
        }

        .upload-box:hover {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .upload-box p {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text);
        }

        .controls {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text);
        }

        input[type="number"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            width: 50px;
            text-align: center;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover { filter: invert(1); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #previewContainer {
            margin-top: 30px;
            display: none;
            border: 1px solid var(--border);
            padding: 10px;
            background: #000;
        }

        video {
            width: 100%;
            max-height: 300px;
            background: #000;
            display: block;
        }

        #status {
            margin: 20px 0;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text);
            letter-spacing: 1px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .download-link {
            padding: 12px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--accent);
            font-size: 0.65rem;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .download-link:hover { border-color: var(--accent); background: #111; }

        #fileInput { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Batch Logic</h1>

        <div class="upload-box" id="dropZone">
            <p id="fileNameDisplay">Drop MP4 or Click to select</p>
        </div>
        
        <input type="file" id="fileInput" accept="video/mp4">

        <div class="controls" id="controls">
            <div class="input-row">
                <span>Split into</span>
                <input type="number" id="clipCount" value="2" min="2">
                <span>Equal Clips</span>
            </div>
            <button id="startBtn">Process & Split</button>
            <button id="mergeBtn" style="display:none; background: transparent; color: white; border: 1px solid white;">Generate Combined Preview</button>
        </div>

        <div id="previewContainer">
            <p style="font-size: 0.6rem; color: #555; margin-bottom: 10px; text-align: left;">PREVIEW / COMBINED OUTPUT</p>
            <video id="previewPlayer" controls></video>
            <a id="fullDownload" class="download-link" style="display:block; margin-top:10px; border-color: #fff;">Download Combined Video</a>
        </div>

        <div id="status">Initializing Engine...</div>
        <div class="results-grid" id="results"></div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const status = document.getElementById('status');
        const controls = document.getElementById('controls');
        const startBtn = document.getElementById('startBtn');
        const mergeBtn = document.getElementById('mergeBtn');
        const results = document.getElementById('results');
        const clipCountInput = document.getElementById('clipCount');
        const previewContainer = document.getElementById('previewContainer');
        const previewPlayer = document.getElementById('previewPlayer');
        const fullDownload = document.getElementById('fullDownload');

        let videoFile = null;
        let generatedClips = [];

        // 1. Init
        (async () => {
            await ffmpeg.load();
            status.innerText = "System Ready";
        })();

        // 2. Files
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#fff"; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = ""; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (file && file.type.includes("video")) {
                videoFile = file;
                document.getElementById('fileNameDisplay').innerText = file.name;
                controls.style.display = "flex";
                status.innerText = "File loaded.";
                mergeBtn.style.display = "none";
                previewContainer.style.display = "none";
            }
        }

        // 3. Split Logic
        startBtn.onclick = async () => {
            const numClips = parseInt(clipCountInput.value);
            startBtn.disabled = true;
            results.innerHTML = "";
            generatedClips = [];
            
            status.innerText = "Processing video... (Checking keyframes)";
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));

            const video = document.createElement('video');
            video.src = URL.createObjectURL(videoFile);
            video.onloadedmetadata = async () => {
                const duration = video.duration;
                const segmentTime = duration / numClips;

                for (let i = 0; i < numClips; i++) {
                    const start = i * segmentTime;
                    const output = `part_${i + 1}.mp4`;
                    status.innerText = `Generating Clip ${i + 1}/${numClips}...`;

                    // FIX CHOPS: Put -ss AFTER -i for precise cutting, or use specific flags for -c copy
                    // To keep exact quality without choppiness, we use -avoid_negative_ts make_zero
                    await ffmpeg.run(
                        '-ss', start.toString(), 
                        '-t', segmentTime.toString(), 
                        '-i', 'input.mp4', 
                        '-c', 'copy', 
                        '-avoid_negative_ts', 'make_zero', 
                        '-map_metadata', '0',
                        output
                    );

                    const data = ffmpeg.FS('readFile', output);
                    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                    generatedClips.push(output);

                    const a = document.createElement('a');
                    a.href = url;
                    a.download = output;
                    a.className = "download-link";
                    a.innerText = `Part ${i + 1}`;
                    results.appendChild(a);
                }

                status.innerText = "Batch Process Complete.";
                startBtn.disabled = false;
                mergeBtn.style.display = "block";
            };
        };

        // 4. Merge/Preview Logic
        mergeBtn.onclick = async () => {
            status.innerText = "Stitching clips for preview...";
            mergeBtn.disabled = true;

            // Create a file list for FFmpeg concat
            let listContent = "";
            generatedClips.forEach(filename => {
                listContent += `file '${filename}'\n`;
            });
            ffmpeg.FS('writeFile', 'concat_list.txt', new TextEncoder().encode(listContent));

            // Run Concat
            await ffmpeg.run('-f', 'concat', '-safe', '0', '-i', 'concat_list.txt', '-c', 'copy', 'merged_preview.mp4');

            const data = ffmpeg.FS('readFile', 'merged_preview.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            previewPlayer.src = url;
            fullDownload.href = url;
            fullDownload.download = "combined_preview.mp4";
            previewContainer.style.display = "block";
            
            status.innerText = "Preview Generated.";
            mergeBtn.disabled = false;
        };
    </script>
</body>
</html>
