<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Split & Merge // Grayscale</title>
    
    <!-- FFmpeg v0.11 for maximum compatibility -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --secondary: #1a1a1a;
            --text-dim: #666666;
            --border: #222222;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 200;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 40px;
            text-align: center;
            color: var(--text-dim);
        }

        /* Drop Zone */
        .upload-area {
            border: 1px solid var(--border);
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--secondary);
            margin-bottom: 30px;
        }

        .upload-area:hover { border-color: var(--accent); }
        .upload-area p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }

        /* Controls */
        .section {
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; }
        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }

        input[type="number"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            width: 50px;
            text-align: center;
            outline: none;
            font-size: 0.9rem;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; transform: none; }

        /* List Items */
        .clip-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            gap: 15px;
            animation: fadeIn 0.4s ease;
        }

        .clip-item:last-child { border-bottom: none; }
        
        .checkbox-container {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        input[type="checkbox"] { cursor: pointer; filter: grayscale(1); accent-color: white; }

        .clip-info { flex-grow: 1; font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); }

        .download-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.6rem;
            border: 1px solid var(--border);
            padding: 5px 10px;
            transition: var(--transition);
        }

        .download-btn:hover { border-color: var(--accent); }

        #status {
            text-align: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 20px 0;
        }

        #fileInput { display: none; }

        .merge-box {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Studio // Batch</h1>

        <div class="upload-area" id="dropZone">
            <p id="fileName">Select or Drop MP4</p>
        </div>
        <input type="file" id="fileInput" accept="video/mp4">

        <div class="section" id="splitControls">
            <div class="row">
                <span class="label">Number of segments</span>
                <input type="number" id="clipCount" value="2" min="2" max="20">
            </div>
            <button id="startBtn">Split & Smooth Re-encode</button>
        </div>

        <div id="status">System Standby</div>

        <div class="section" id="resultsSection">
            <div class="label" style="margin-bottom: 10px;">Output Clips</div>
            <div id="clipList"></div>
            
            <div class="merge-box">
                <p class="label" style="margin-bottom: 15px;">Select clips above to join them into one video</p>
                <button id="mergeBtn" disabled>Generate Compilation</button>
            </div>
        </div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const status = document.getElementById('status');
        const splitControls = document.getElementById('splitControls');
        const resultsSection = document.getElementById('resultsSection');
        const clipList = document.getElementById('clipList');
        const startBtn = document.getElementById('startBtn');
        const mergeBtn = document.getElementById('mergeBtn');

        let videoFile = null;
        let generatedClips = []; // Stores { name, blobUrl }

        // Initialize FFmpeg
        (async () => {
            status.innerText = "Loading Engine...";
            await ffmpeg.load();
            status.innerText = "Ready";
        })();

        // Interaction
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        
        function handleFile(file) {
            if (file) {
                videoFile = file;
                document.getElementById('fileName').innerText = file.name;
                splitControls.style.display = "flex";
                status.innerText = "File Analyzed";
            }
        }

        // Split Logic
        startBtn.onclick = async () => {
            const numClips = parseInt(document.getElementById('clipCount').value);
            startBtn.disabled = true;
            clipList.innerHTML = "";
            generatedClips = [];
            
            status.innerText = "Mounting Video...";
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));

            const duration = await getVideoDuration(videoFile);
            const seg = duration / numClips;

            for (let i = 0; i < numClips; i++) {
                const start = i * seg;
                const outputName = `clip_${i + 1}.mp4`;
                status.innerText = `Processing Smooth Clip ${i + 1}/${numClips}...`;

                /* 
                   We use '-preset ultrafast' for speed 
                   and '-crf 18' for high quality.
                   This fixes the "choppiness" by re-calculating frames at the start of the cut.
                */
                await ffmpeg.run(
                    '-ss', start.toString(),
                    '-t', seg.toString(),
                    '-i', 'input.mp4',
                    '-c:v', 'libx264', 
                    '-preset', 'ultrafast',
                    '-crf', '18',
                    '-c:a', 'aac',
                    outputName
                );

                const data = ffmpeg.FS('readFile', outputName);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                generatedClips.push({ name: outputName, url: url, buffer: data });
                addClipToUI(i + 1, url);
            }

            resultsSection.style.display = "flex";
            status.innerText = "Batch Process Complete";
            startBtn.disabled = false;
        };

        function addClipToUI(index, url) {
            const div = document.createElement('div');
            div.className = 'clip-item';
            div.innerHTML = `
                <input type="checkbox" class="clip-select" data-index="${index-1}">
                <div class="clip-info">Part ${index}</div>
                <a href="${url}" download="clip_${index}.mp4" class="download-btn">Save</a>
            `;
            clipList.appendChild(div);

            div.querySelector('input').onchange = () => {
                const checked = document.querySelectorAll('.clip-select:checked');
                mergeBtn.disabled = checked.length < 2;
            };
        }

        // Merge/Preview Logic
        mergeBtn.onclick = async () => {
            const selectedIdx = Array.from(document.querySelectorAll('.clip-select:checked'))
                                     .map(cb => cb.dataset.index);
            
            mergeBtn.disabled = true;
            status.innerText = "Merging selected clips...";

            // Create a concat list for FFmpeg
            let concatList = "";
            selectedIdx.forEach(idx => {
                const clip = generatedClips[idx];
                concatList += `file '${clip.name}'\n`;
            });

            ffmpeg.FS('writeFile', 'concat_list.txt', new TextEncoder().encode(concatList));

            // Run concat command
            await ffmpeg.run('-f', 'concat', '-safe', '0', '-i', 'concat_list.txt', '-c', 'copy', 'merged.mp4');

            const data = ffmpeg.FS('readFile', 'merged.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

            const finalLink = document.createElement('a');
            finalLink.href = url;
            finalLink.download = "compilation.mp4";
            finalLink.click();

            status.innerText = "Compilation Downloaded";
            mergeBtn.disabled = false;
        };

        function getVideoDuration(file) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = () => resolve(video.duration);
                video.src = URL.createObjectURL(file);
            });
        }
    </script>
</body>
</html>
