<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Splitter // Grayscale</title>
    
    <!-- FFmpeg.wasm Libraries -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.umd.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text: #888888;
            --border: #222222;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 40px;
            color: var(--text);
        }

        /* Upload Area */
        .drop-zone {
            border: 1px solid var(--border);
            padding: 60px 20px;
            border-radius: 2px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            background: rgba(255,255,255,0.02);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .drop-zone p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text);
        }

        /* Controls */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .controls.visible {
            opacity: 1;
            pointer-events: all;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        label { font-size: 0.7rem; text-transform: uppercase; color: var(--text); }

        input[type="number"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            width: 40px;
            text-align: center;
            padding: 5px;
            outline: none;
            transition: var(--transition);
        }

        input[type="number"]:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: bold;
        }

        button:hover {
            filter: invert(1);
            transform: scale(1.02);
        }

        button:disabled {
            background: var(--border);
            color: var(--text);
            cursor: not-allowed;
        }

        /* Progress */
        #status {
            margin-top: 20px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text);
        }

        /* Download List */
        #downloadList {
            margin-top: 30px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-item {
            font-size: 0.7rem;
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            display: block;
            transition: var(--transition);
        }

        .download-item:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Batch Splitter</h1>

        <div class="drop-zone" id="dropZone">
            <p id="dropText">Drop MP4 file or click to select</p>
            <input type="file" id="fileInput" accept="video/mp4">
        </div>

        <div class="controls" id="controls">
            <div class="input-group">
                <label>Number of clips</label>
                <input type="number" id="clipCount" value="2" min="2" max="20">
            </div>
            <button id="processBtn">Process & Export</button>
        </div>

        <div id="status"></div>
        <div id="downloadList"></div>
    </div>

    <script>
        const { FFmpeg } = window.FFmpegWASM;
        const { fetchFile, toBlobURL } = window.FFmpegUtil;
        
        let ffmpeg = null;
        let selectedFile = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropText = document.getElementById('dropText');
        const controls = document.getElementById('controls');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        const downloadList = document.getElementById('downloadList');
        const clipCountInput = document.getElementById('clipCount');

        // Initialize FFmpeg
        async function initFFmpeg() {
            status.innerText = "Loading Engine...";
            ffmpeg = new FFmpeg();
            
            // Load from CDN
            const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });
            status.innerText = "Engine Ready";
        }

        initFFmpeg();

        // File Selection Logic
        dropZone.onclick = () => fileInput.click();
        
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (file && file.type === "video/mp4") {
                selectedFile = file;
                dropText.innerText = file.name;
                controls.classList.add('visible');
                downloadList.innerHTML = "";
            } else {
                alert("Please select a valid MP4 file.");
            }
        }

        // Processing Logic
        processBtn.onclick = async () => {
            if (!ffmpeg || !selectedFile) return;

            processBtn.disabled = true;
            downloadList.innerHTML = "";
            
            const numClips = parseInt(clipCountInput.value);
            const fileName = 'input.mp4';
            
            status.innerText = "Reading File...";
            await ffmpeg.writeFile(fileName, await fetchFile(selectedFile));

            // Get duration using a temporary video element
            const duration = await getVideoDuration(selectedFile);
            const segmentDuration = duration / numClips;

            for (let i = 0; i < numClips; i++) {
                const startTime = i * segmentDuration;
                const outputName = `clip_${i + 1}.mp4`;
                status.innerText = `Processing Clip ${i + 1} of ${numClips}...`;

                // -c copy is the secret to "Exact Quality" - it doesn't re-encode, just cuts
                await ffmpeg.exec([
                    '-i', fileName,
                    '-ss', startTime.toString(),
                    '-t', segmentDuration.toString(),
                    '-c', 'copy', 
                    outputName
                ]);

                const data = await ffmpeg.readFile(outputName);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                const link = document.createElement('a');
                link.href = url;
                link.download = outputName;
                link.className = 'download-item';
                link.innerText = `DOWNLOAD CLIP ${i + 1} (${Math.round(segmentDuration)}s)`;
                downloadList.appendChild(link);
            }

            status.innerText = "Batch Complete.";
            processBtn.disabled = false;
        };

        function getVideoDuration(file) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = () => {
                    resolve(video.duration);
                };
                video.src = URL.createObjectURL(file);
            });
        }
    </script>
</body>
</html>
