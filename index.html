<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Splitter // Grayscale</title>
    
    <!-- FFmpeg.wasm Libraries -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.umd.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text: #888888;
            --border: #222222;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 40px;
            color: var(--text);
        }

        /* Upload Area */
        #dropZone {
            border: 1px solid var(--border);
            padding: 80px 20px;
            border-radius: 2px;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255,255,255,0.01);
            position: relative;
            z-index: 10;
        }

        #dropZone:hover {
            border-color: var(--accent);
            background: rgba(255,255,255,0.04);
        }

        #dropZone.dragover {
            border-color: var(--accent);
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
        }

        #dropZone p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text);
            pointer-events: none;
        }

        /* Controls */
        #controls {
            margin-top: 30px;
            display: none; /* Hidden until file selected */
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.5s ease forwards;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        label { font-size: 0.7rem; text-transform: uppercase; color: var(--text); }

        input[type="number"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            width: 50px;
            text-align: center;
            padding: 5px;
            outline: none;
            transition: var(--transition);
        }

        input[type="number"]:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: bold;
        }

        button:hover {
            filter: invert(1);
        }

        button:disabled {
            background: var(--border);
            color: var(--text);
            cursor: not-allowed;
            filter: none;
        }

        /* Progress & Status */
        #status {
            margin-top: 25px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text);
            min-height: 1em;
        }

        /* Download List */
        #downloadList {
            margin-top: 30px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-item {
            font-size: 0.7rem;
            text-decoration: none;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 12px;
            display: block;
            transition: var(--transition);
            background: transparent;
        }

        .download-item:hover {
            background: var(--accent);
            color: var(--bg);
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Batch Splitter</h1>

        <div id="dropZone">
            <p id="dropText">Drop MP4 file or click to select</p>
        </div>
        <input type="file" id="fileInput" accept="video/mp4">

        <div id="controls">
            <div class="input-group">
                <label>Split into how many clips?</label>
                <input type="number" id="clipCount" value="2" min="2" max="50">
            </div>
            <button id="processBtn">Start Batch Process</button>
        </div>

        <div id="status">Ready</div>
        <div id="downloadList"></div>
    </div>

    <script>
        const { FFmpeg } = window.FFmpegWASM;
        const { fetchFile, toBlobURL } = window.FFmpegUtil;
        
        let ffmpeg = null;
        let selectedFile = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropText = document.getElementById('dropText');
        const controls = document.getElementById('controls');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        const downloadList = document.getElementById('downloadList');
        const clipCountInput = document.getElementById('clipCount');

        // PREVENT BROWSER FROM OPENING DROPPED FILES
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());

        // INITIALIZE FFMPEG
        async function initFFmpeg() {
            try {
                status.innerText = "Initializing Engine...";
                ffmpeg = new FFmpeg();
                
                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                });
                status.innerText = "System Ready";
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Check Console (Headers Required)";
                alert("Note: This requires 'Cross-Origin-Embedder-Policy' headers. If you are testing locally, use a local server or deploy to Netlify with the _headers file.");
            }
        }

        initFFmpeg();

        // FILE HANDLING
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (file.type === "video/mp4" || file.name.endsWith('.mp4')) {
                selectedFile = file;
                dropText.innerText = `Selected: ${file.name}`;
                controls.style.display = 'flex';
                downloadList.innerHTML = "";
                status.innerText = "File loaded. Ready to split.";
            } else {
                alert("Please upload an MP4 file.");
            }
        }

        // PROCESSING
        processBtn.onclick = async () => {
            if (!ffmpeg || !selectedFile) return;

            processBtn.disabled = true;
            downloadList.innerHTML = "";
            
            const numClips = parseInt(clipCountInput.value);
            const inputFileName = 'input.mp4';
            
            status.innerText = "Writing file to memory...";
            await ffmpeg.writeFile(inputFileName, await fetchFile(selectedFile));

            const duration = await getVideoDuration(selectedFile);
            const segmentDuration = duration / numClips;

            for (let i = 0; i < numClips; i++) {
                const startTime = i * segmentDuration;
                const outputName = `clip_${i + 1}.mp4`;
                status.innerText = `Processing Clip ${i + 1} of ${numClips}...`;

                // '-c copy' ensures exact same quality (no re-encoding)
                await ffmpeg.exec([
                    '-ss', startTime.toString(),
                    '-t', segmentDuration.toString(),
                    '-i', inputFileName,
                    '-c', 'copy',
                    outputName
                ]);

                const data = await ffmpeg.readFile(outputName);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                const link = document.createElement('a');
                link.href = url;
                link.download = outputName;
                link.className = 'download-item';
                link.innerText = `Download Part ${i + 1} (${Math.round(segmentDuration)}s)`;
                downloadList.appendChild(link);
            }

            status.innerText = "All clips processed successfully.";
            processBtn.disabled = false;
        };

        function getVideoDuration(file) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = () => {
                    resolve(video.duration);
                };
                video.src = URL.createObjectURL(file);
            });
        }
    </script>
</body>
</html>
